# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - fcu-courses

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          # 1. 進入前端資料夾，安裝套件並打包 Vue (產生 dist)
          cd client
          npm install
          npm run build
          cd ..
          
          # 2. 進入後端資料夾，安裝 Node.js 需要的套件
          cd server
          npm install
          cd ..
          
          # 3. 安裝根目錄 (確保你的 start 腳本等設定能正常運作)
          npm install --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
        
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1CF2BD0D418E4F4DB76B208C962C396F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AC0F33CA6D3C493ABF12875DDD60F0F3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_05EBDB33053F4284AEEADDCF50719A1B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'fcu-courses'
          slot-name: 'Production'
          package: .
